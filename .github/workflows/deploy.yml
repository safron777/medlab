name: Deploy Medlab

on:
  push:
    branches:
      - main

jobs:
  # ── Step 1: run unit tests before touching prod ──────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: medlab/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: medlab

      - name: Run unit tests
        run: npm run test:unit
        working-directory: medlab

  # ── Step 2: deploy to VPS only if tests pass ─────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BOT_VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.BOT_VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.BOT_VPS_HOST }}
          VPS_USER: ${{ secrets.BOT_VPS_USER }}
          VPS_PORT: ${{ secrets.BOT_VPS_PORT }}
          REPO_TOKEN: ${{ secrets.BOT_REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MEDLAB_JWT_SECRET: ${{ secrets.MEDLAB_JWT_SECRET }}
          MEDLAB_SMTP_HOST: ${{ secrets.MEDLAB_SMTP_HOST }}
          MEDLAB_SMTP_PORT: ${{ secrets.MEDLAB_SMTP_PORT }}
          MEDLAB_SMTP_USER: ${{ secrets.MEDLAB_SMTP_USER }}
          MEDLAB_SMTP_PASS: ${{ secrets.MEDLAB_MAIL_PASS }}
          MEDLAB_SMTP_FROM: ${{ secrets.MEDLAB_SMTP_FROM }}
          MEDLAB_SMTP_SECURE: ${{ secrets.MEDLAB_SMTP_SECURE }}
          MEDLAB_APP_URL: "https://medlab.stoictracker.app"
        run: |
          : "${VPS_PORT:=22}"
          CLONE_URL="https://x-access-token:${REPO_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          ssh -i ~/.ssh/id_rsa -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" bash -s <<EOF
          set -euo pipefail

          # ── Clone / update repo ─────────────────────────────────────────────
          if [ -d /opt/medlab_repo/.git ]; then
            cd /opt/medlab_repo
            git fetch origin main
            git reset --hard origin/main
          else
            rm -rf /opt/medlab_repo
            git clone "$CLONE_URL" /opt/medlab_repo
          fi

          cd /opt/medlab_repo

          # ── Tag previous image for rollback (before building new one) ───────
          if docker image inspect medlab:latest &>/dev/null; then
            docker tag medlab:latest medlab:previous
            echo "Previous image saved as medlab:previous"
          fi

          # ── Build new Docker image ──────────────────────────────────────────
          docker build -t medlab:latest ./medlab

          # ── Ensure data volume directory exists ─────────────────────────────
          mkdir -p /opt/medlab/data

          # ── Replace container ───────────────────────────────────────────────
          if docker ps -a --format '{{.Names}}' | grep -Eq '^medlab$'; then
            docker stop medlab || true
            docker rm   medlab || true
          fi

          docker run -d \
            --name medlab \
            --restart always \
            -p 127.0.0.1:3002:3000 \
            -v /opt/medlab/data:/data \
            -e NODE_ENV=production \
            -e JWT_SECRET="$MEDLAB_JWT_SECRET" \
            -e SMTP_HOST="$MEDLAB_SMTP_HOST" \
            -e SMTP_PORT="${MEDLAB_SMTP_PORT:-587}" \
            -e SMTP_USER="$MEDLAB_SMTP_USER" \
            -e SMTP_PASS="$MEDLAB_SMTP_PASS" \
            -e SMTP_FROM="$MEDLAB_SMTP_FROM" \
            -e SMTP_SECURE="${MEDLAB_SMTP_SECURE:-true}" \
            -e APP_URL="$MEDLAB_APP_URL" \
            medlab:latest

          # ── Smoke test with retries (up to 20s) ─────────────────────────────
          echo "Waiting for container to be ready..."
          for i in \$(seq 1 10); do
            if curl -sf http://localhost:3002/health > /dev/null; then
              echo "Smoke test passed on attempt \$i"
              break
            fi
            if [ "\$i" -eq 10 ]; then
              echo "ERROR: smoke test failed after 10 attempts — rolling back"
              docker logs medlab --tail 50 || true
              docker stop medlab || true
              docker rm   medlab || true

              if docker image inspect medlab:previous &>/dev/null; then
                echo "Starting rollback to medlab:previous..."
                docker run -d \
                  --name medlab \
                  --restart always \
                  -p 127.0.0.1:3002:3000 \
                  -v /opt/medlab/data:/data \
                  -e NODE_ENV=production \
                  -e JWT_SECRET="$MEDLAB_JWT_SECRET" \
                  -e SMTP_HOST="$MEDLAB_SMTP_HOST" \
                  -e SMTP_PORT="${MEDLAB_SMTP_PORT:-587}" \
                  -e SMTP_USER="$MEDLAB_SMTP_USER" \
                  -e SMTP_PASS="$MEDLAB_SMTP_PASS" \
                  -e SMTP_FROM="$MEDLAB_SMTP_FROM" \
                  -e SMTP_SECURE="${MEDLAB_SMTP_SECURE:-true}" \
                  -e APP_URL="$MEDLAB_APP_URL" \
                  medlab:previous
                echo "Rollback complete — previous version is running"
              else
                echo "No previous image found, service remains down"
              fi
              exit 1
            fi
            echo "Attempt \$i failed, retrying in 2s..."
            sleep 2
          done

          # ── Cleanup dangling images (keep latest + previous) ─────────────────
          docker image prune -f

          echo "Medlab deployed successfully"
          EOF

# medlab.stoictracker.app
# Скопировать на VPS: /etc/nginx/sites-available/medlab
# Затем: ln -s /etc/nginx/sites-available/medlab /etc/nginx/sites-enabled/medlab
# SSL: certbot --nginx -d medlab.stoictracker.app

server {
    listen 80;
    server_name medlab.stoictracker.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medlab.stoictracker.app;

    ssl_certificate     /etc/letsencrypt/live/medlab.stoictracker.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medlab.stoictracker.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Ограничение размера загружаемых файлов (attachments до 10 МБ × 10 штук)
    client_max_body_size 110m;

    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Таймаут для импорта PDF / экспорта
        proxy_read_timeout 60s;
    }
}
